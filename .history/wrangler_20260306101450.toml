name = "cencore"
type = "javascript"
compatibility_date = "2024-12-12"
main = "src/main.tsx"

# Cloudflare Pages deployment configuration
pages_build_output_dir = "dist"

[build]
# Build the Vite React app to dist/
# Remove supabase and other non-essential directories before deployment
command = "npm run build && rm -rf supabase server data"
watch_paths = ["src/**/*.ts", "src/**/*.tsx"]

[env.production]
name = "cencore"
vars = { ENVIRONMENT = "production" }
